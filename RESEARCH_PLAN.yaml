research_methodology:
  data_to_find:
    - email: "dirección de email de contacto del centro (para P0 y P1)"
    - web: "URL del sitio web oficial del centro (para P0 y P2)"

  sources_priority:
    - name: "Página web del centro (si tiene)"
      description: >
        Buscar sección 'Contacto' o 'Contact us'.
        En webs de congregaciones, buscar el centro concreto en su listado.
      weight: 1.0

    - name: "Junta de Andalucía — Buscador de Centros"
      url: "https://www.juntadeandalucia.es/educacion/portals/web/ced/centros"
      description: "Fuente oficial. Búsqueda por nombre, localidad o código de centro."
      weight: 0.95

    - name: "Directorio Micole"
      url: "https://www.micole.net/"
      description: "Directorio de colegios con datos de contacto."
      weight: 0.7

    - name: "BuscoColegio"
      url: "https://www.buscocolegio.com/"
      description: "Directorio alternativo."
      weight: 0.7

    - name: "Google Maps"
      description: "A menudo tiene email y web en la ficha del centro."
      weight: 0.6

    - name: "Redes sociales y prensa local"
      description: "Facebook, Instagram, artículos de prensa (ABC Sevilla, Diario de Sevilla)."
      weight: 0.4

  validation_rules:
    - "El email debe ser del centro REAL, no genérico de la congregación"
    - "La web debe cargar y mostrar contenido del centro (no 404, no portal genérico)"
    - "Si hay datos contradictorios: web propia > Junta Andalucía > directorios"
    - "Si no se encuentra tras 3 fuentes distintas: marcar NO ENCONTRADO"
    - "Emails 'info@...' o 'contacto@...' valen si son del centro"

  notes_on_duplicates:
    - "#46-#50 (Carmelitas) comparten email secretaria@carmelitassevilla.es — verificar si tienen emails propios"
    - "#52 y #53 (Col. San José) comparten email y teléfono — confirmar si son sedes del mismo centro"
    - "#55-#60 (SAFA, San Blas, etc.) tienen 'contact via website' — buscar email directo"
    - "#68 Colegio San Francisco De Paula aparece como 'intencionadamente excluido' en el texto, pero está listado"

agent_architecture:
  phase_1:
    name: "Investigación paralela"
    max_agents: 4
    description: >
      Cada agente recibe un lote de centros y busca emails y/o webs según lo que falte.
      P0 (ambos) y P1 (solo email) se reparten entre los primeros agentes.
      P2 (solo web) se reparte después.
    batch_size: 7..9

  phase_2:
    name: "Integración y parcheo"
    agents: 1
    description: >
      Agente integrador recoge resultados, resuelve conflictos,
      genera YAML consolidado e instrucciones de parcheo para index.html.

output_format:
  description: "Cada agente devuelve resultados en este formato exacto"
  schema:
    resultados:
      - numero: 55
        nombre: "Col. SAFA (Alcalá de Guadaíra)"
        datos_previos:
          email: null             # "contact via website"
          web: null               # "no website found"
        datos_encontrados:
          email:
            valor: "safa.alcala@salesianos.edu"
            fuente: "https://www.salesianosalcala.com/contacto"
            confianza: "alta"     # alta | media | baja
            metodo: "buscar web del centro → sección contacto"
          web:
            valor: "https://www.salesianosalcala.com"
            fuente: "Google search"
            confianza: "alta"
            metodo: "Google → resultado orgánico"
        notas: ""

      - numero: 61
        nombre: "Col. Aljarafe"
        datos_previos:
          email: null             # "contact via website"
          web: "https://colegioaljarafe.es"
        datos_encontrados:
          email:
            valor: "secretaria@colegioaljarafe.es"
            fuente: "https://colegioaljarafe.es/contacto"
            confianza: "alta"
            metodo: "navegar web del centro → sección contacto"
          web: null               # ya tenía web, no se investiga
        notas: ""

  confianza_criteria:
    alta: "Fuente primaria oficial (web del centro, sección contacto, Junta de Andalucía)"
    media: "Fuente secundaria fiable (Micole, BuscoColegio, Google Maps)"
    baja: "Red social no oficial, foro, fuente no contrastada"

feedback_loop:
  steps:
    - "Revisar cada resultado: ¿el email parece de contacto real o genérico?"
    - "Verificar que las URLs encontradas cargan y corresponden al centro"
    - "Si dos centros comparten email, confirmar si es correcto (congregaciones)"
    - "Auto-evaluación: 'Mi conclusión para el centro X es [dato]. Certeza: alta/media/baja porque [razón].'"

deliverables:
  - file: findings.yaml
    description: "Resultados completos de la investigación (todos los centros)"
    format: "Ver output_format.schema"

  - file: patches.yaml
    description: "Instrucciones para aplicar cambios al index.html"
    format:
      patches:
        - numero: 55
          campo: "email"
          accion: "reemplazar"
          buscar: "contact via website"
          reemplazar: "safa.alcala@salesianos.edu"
        - numero: 55
          campo: "web"
          accion: "reemplazar"
          buscar: "no website found"
          reemplazar: "https://www.salesianosalcala.com"

  - file: summary.txt
    description: "Resumen ejecutivo"
    content: >
      Centros investigados, completados, no encontrados,
      y aquellos que requieren verificación manual.
