research_methodology:
  sources_priority:
    - name: "Junta de Andalucía — Buscador de Centros"
      url: "https://www.juntadeandalucia.es/educacion/portals/web/ced/centros"
      description: "Fuente oficial. Búsqueda por nombre, localidad o código de centro."
      weight: 1.0  # máxima prioridad

    - name: "Web propia del centro / congregación"
      description: >
        Google: 'nombre del centro Sevilla' o 'nombre [localidad]'.
        Si pertenece a congregación (Salesianos, Carmelitas, Jesuitinas, SAFA),
        buscar en el listado de centros de la congregación.
      weight: 0.9

    - name: "Directorio Micole"
      url: "https://www.micole.net/"
      description: "Directorio de colegios en España con datos actualizados."
      weight: 0.7

    - name: "BuscoColegio"
      url: "https://www.buscocolegio.com/"
      description: "Directorio alternativo."
      weight: 0.7

    - name: "Google Maps"
      description: "A menudo tiene web y teléfono actualizados."
      weight: 0.6

    - name: "Redes sociales y prensa local"
      description: "Facebook, Instagram, ABC Sevilla, Diario de Sevilla."
      weight: 0.4  # sólo como último recurso

  validation_rules:
    - "La web debe ser del centro REAL, no de una congregación genérica"
    - "El teléfono debe ser del centro específico, no de una centralita"
    - "Si hay datos contradictorios: Junta de Andalucía > web propia > directorios"
    - "Si no se encuentra tras 3 fuentes distintas: marcar NO ENCONTRADO"
    - "Verificar que las URLs cargan (no 404, no redirección genérica)"

  notes_on_duplicates:
    - "#52 y #53 (Col. San José) comparten teléfono 954218353 — confirmar si es el mismo centro"
    - "#46-#50 (Carmelitas) comparten dirección C/ Bailén 32 — confirmar que son distintos"
    - "Varios centros de congregaciones pueden compartir email de secretaría"

agent_architecture:
  phase_1:
    name: "Investigación paralela"
    max_agents: 4
    description: >
      Cada agente recibe un lote de centros (7-8) y busca los datos faltantes.
      Cada centro se investiga de forma independiente.
    per_agent_output: see section "output_format" below

  phase_2:
    name: "Integración y parcheo"
    agents: 1
    description: >
      Agente integrador recoge resultados, resuelve conflictos,
      genera YAML consolidado e instrucciones de parcheo para index.html.

output_format:
  description: "Cada agente devuelve resultados en este formato exacto"
  schema:
    resultados:
      - numero: 7
        nombre: "Col. de Fomento Entreolivos"
        datos_previos:
          telefono: null
          web: "https://www.entreolivos.com"
        datos_encontrados:
          telefono:
            valor: "954XXXXXX"
            fuente: "https://www.juntadeandalucia.es/..."
            confianza: "alta"   # alta | media | baja
            metodo: "búsqueda en buscador de centros Junta Andalucía"
          web: null   # ya tenía web, no se investiga
        notas: "Encontrado en Junta Andalucía"

      - numero: 39
        nombre: "Centro Cristo Rey"
        datos_previos:
          telefono: "954271430"
          web: null    # "no website found"
        datos_encontrados:
          telefono: null   # ya tenía, no se investiga
          web:
            valor: "https://www.ejemplo.com"
            fuente: "Google search"
            confianza: "alta"
            metodo: "Google → resultado orgánico → web oficial"
        notas: ""

  confianza_criteria:
    alta: "Fuente primaria oficial (web del centro, Junta de Andalucía)"
    media: "Fuente secundaria fiable (Micole, BuscoColegio, Google Maps)"
    baja: "Red social no oficial, fuente no contrastada, rumor"

feedback_loop:
  steps:
    - "Revisar cada resultado: ¿algún dato parece incorrecto?"
    - "Verificar que las URLs encontradas realmente cargan y corresponden al centro"
    - "Si dos centros comparten teléfono, confirmar que es correcto"
    - "Para direcciones duplicadas, confirmar que son centros distintos"
    - "Auto-evaluación: 'Mi conclusión para el centro X es [dato]. Certeza: alta/media/baja porque [razón].'"

deliverables:
  - file: findings.yaml
    description: "Resultados completos de la investigación (todos los centros)"
    format: "Ver output_format.schema"

  - file: patches.yaml
    description: "Instrucciones para aplicar cambios al index.html"
    format:
      patches:
        - numero: 7
          campo: "phone"
          accion: "insertar"
          contenido: "<strong>📞</strong> 954XXXXXX"
          posicion: "después de card-name"
        - numero: 39
          campo: "web"
          accion: "reemplazar"
          buscar: "no website found"
          reemplazar: "https://www.ejemplo.com"

  - file: summary.txt
    description: "Resumen ejecutivo: completados, no encontrados, requieren verificación manual"
