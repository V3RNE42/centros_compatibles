# =============================================================================
# RESEARCH_PLAN.yaml — Investigación de centros educativos (Sevilla)
# Instrucciones para equipo de agentes autónomos
# =============================================================================
# Prioridad: P0 sin ambos → P1 sin teléfono → P2 sin web
# Archivo objetivo: index.html (70 centros)
# Repo: https://github.com/V3RNE42/centros_compatibles
# =============================================================================

project:
  name: centros_compatibles
  description: >
    Tablero HTML con 70 centros educativos de Sevilla y área metropolitana,
    compatibles con perfil de teacher de inglés (TEFL Nivel 5).
    Cada centro tiene card con nombre, dirección, teléfono, web y email.
  target_file: index.html
  repo: https://github.com/V3RNE42/centros_compatibles

card_structure: |
  <div class="school-card">
    <div class="card-body">
      <div class="card-name"><span class="card-number">N</span> Nombre</div>
      <div class="card-phone"><strong>📞</strong> 954XXXXXX</div>
      <div class="card-addr">Dirección</div>
      <div class="card-links">
        <a class="link-chip" href="URL">URL</a>        (o "no website found")
        <span class="email-chip" data-email="...">...</span>
      </div>
    </div>
  </div>

